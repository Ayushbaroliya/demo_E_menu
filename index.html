<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Menu — Table Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=3">

</head>
<body>

<div class="grain"></div>

<!-- ===================== TOPBAR ===================== -->
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 9h14l-1.4 9.2A2 2 0 0 1 15.6 20H8.4a2 2 0 0 1-2-1.8L5 9Z" stroke="#fff" stroke-width="1.6"/><path d="M8 9V7a4 4 0 0 1 8 0v2" stroke="#fff" stroke-width="1.6"/><path d="M3 9h18" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
    </div>
    <div>
      <p class="brand-name" id="restaurantName">MY MENU</p>
      <p class="brand-tag" id="restaurantTag">DIGITAL TABLE MENU</p>
    </div>
  </div>
  <button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">
    <svg viewBox="0 0 24 24" fill="none"><path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>View Fullscreen</span>
  </button>
</header>

<!-- ===================== CATEGORY RAIL ===================== -->
<div class="cat-rail-wrap">
  <nav class="cat-rail" id="catRail" aria-label="Menu categories"></nav>
</div>

<!-- ===================== MENU ===================== -->
<main class="menu" id="menu"></main>

<!-- ===================== UPSELL MODAL ===================== -->
<div class="upsell-overlay" id="upsellOverlay">
  <div class="upsell-sheet">
    <div class="upsell-head">
      <h3 id="upsellTitle">Complete your meal?</h3>
      <button class="upsell-close" id="upsellClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    
    <div class="ai-loader" id="aiLoader" style="display:none;">
      <div class="ai-spinner"></div>
      <p id="aiLoaderText">✨ AI Chef is analyzing your order...</p>
    </div>

    <div class="upsell-items" id="upsellContainer">
      <!-- Injected via JS -->
    </div>
    <button class="upsell-action" id="upsellContinueBtn">Continue to Cart</button>
  </div>
</div>

<!-- ===================== STICKY MINI CART BAR ===================== -->
<div class="mini-bar" id="miniBar">
  <div class="mini-bar-inner">
    <div class="mini-bar-info">
      <span class="mini-bar-count" id="miniBarCount">0 items</span>
      <span class="mini-bar-total" id="miniBarTotal">₹0</span>
    </div>
    <button class="mini-bar-cta" id="openChitBtn">
      View Order Chit
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- ===================== ORDER CHIT (CART) ===================== -->
<div class="chit-overlay" id="chitOverlay"></div>
<aside class="chit" id="chit" aria-label="Your order">
  <div class="chit-zigzag"></div>
  <div class="chit-head">
    <h2>* Order Chit *</h2>
    <button class="chit-close" id="closeChitBtn" aria-label="Close cart">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="chit-meta">
    <span id="tableLabel">TABLE 07</span>
    <span id="chitTime">--:--</span>
  </div>
  <div class="chit-items" id="chitItems"></div>
  <div class="chit-totals" id="chitTotals"></div>
  <div class="chit-foot">
    <button class="chit-place-btn" id="placeOrderBtn">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M4 12l5 5L20 6" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Send to Kitchen
    </button>
    <p class="chit-note">No payment is taken here — this sends your order to the waiter.</p>
  </div>
</aside>

<!-- ===================== SERVICE BELL ===================== -->
<button class="bell-fab" id="bellFab" aria-label="Call for service">
  <svg viewBox="0 0 24 24" fill="none"><path d="M18 16v-5a6 6 0 0 0-12 0v5l-2 3h16l-2-3Z" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 20a2 2 0 0 0 4 0" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/></svg>
</button>

<div class="sheet-overlay" id="sheetOverlay"></div>
<section class="sheet" id="serviceSheet" aria-label="Request service">
  <div class="sheet-handle"></div>
  <h3>Need something?</h3>
  <p>Tap an option — the waiter for your table will be notified.</p>
  <div class="sheet-grid">
    <button class="sheet-opt" data-request="Water">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3s7 7.5 7 12a7 7 0 0 1-14 0c0-4.5 7-12 7-12Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      <span>Water</span>
    </button>
    <button class="sheet-opt" data-request="Tissues">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="7" width="16" height="11" rx="1.5" stroke="currentColor" stroke-width="1.7"/><path d="M6 7c1-3 11-3 12 0" stroke="currentColor" stroke-width="1.7"/></svg>
      <span>Tissues</span>
    </button>
    <button class="sheet-opt" data-request="Waiter">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="6" r="2.4" stroke="currentColor" stroke-width="1.7"/><path d="M5 20c0-4 3-6.5 7-6.5s7 2.5 7 6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      <span>Call Waiter</span>
    </button>
    <button class="sheet-opt" data-request="Bill">
      <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10v18l-2.5-1.5L12 21l-2.5-1.5L7 21V3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M9.5 8h5M9.5 11.5h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      <span>Request Bill</span>
    </button>
  </div>
</section>

<!-- ===================== VIDEO MODAL ===================== -->
<div class="video-overlay" id="videoOverlay">
  <div class="video-box">
    <div class="video-box-head">
      <span id="videoTitle">Preview</span>
      <button id="closeVideoBtn" aria-label="Close preview">✕</button>
    </div>
    <video id="videoPlayer" controls playsinline></video>
  </div>
</div>

<!-- ===================== TOAST ===================== -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M8.5 12.2l2.3 2.3L16 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span id="toastMsg">Done</span>
</div>


<script src="config.js?v=5"></script>
<script src="script.js?v=5"></script>

</body>
</html>
